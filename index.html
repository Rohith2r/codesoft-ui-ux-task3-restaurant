<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Restaurant Menu</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <header>

        <h1>Food Paradise</h1>

        <p>
            Delicious Food For Everyone
        </p>

    </header>

    <section class="menu">

        <h2>Our Menu</h2>

        <div class="menu-container">

            <div class="card">

                <h3>Burger</h3>

                <p>
                    Crispy Veg Burger
                </p>

                <span>₹149</span>

                <button class="orderBtn">
                    Order Now
                </button>

            </div>

            <div class="card">

                <h3>Pizza</h3>

                <p>
                    Cheese Burst Pizza
                </p>

                <span>₹299</span>

                <button class="orderBtn">
                    Order Now
                </button>

            </div>

            <div class="card">

                <h3>Pasta</h3>

                <p>
                    White Sauce Pasta
                </p>

                <span>₹199</span>

                <button class="orderBtn">
                    Order Now
                </button>

            </div>

            <div class="card">

                <h3>French Fries</h3>

                <p>
                    Crispy Fries
                </p>

                <span>₹99</span>

                <button class="orderBtn">
                    Order Now
                </button>

            </div>

            <div class="card">

                <h3>Cold Drink</h3>

                <p>
                    Chilled Beverage
                </p>

                <span>₹59</span>

                <button class="orderBtn">
                    Order Now
                </button>

            </div>

            <div class="card">

                <h3>Ice Cream</h3>

                <p>
                    Chocolate Ice Cream
                </p>

                <span>₹89</span>

                <button class="orderBtn">
                    Order Now
                </button>

            </div>

        </div>

    </section>

    <footer>

        <p>
            © 2026 Food Paradise
        </p>

    </footer>

    <script src="first.js"></script>

</body>
</html>
